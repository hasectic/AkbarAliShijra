				transition:

				color: var(--gold);
				font-style: italic;

				height: 12px;
				border-radius: 3px;
				flex-shrink: 0;

				overflow-x: auto;
				overflow-y: visible;
				padding: 40px 20px 80px;
			}

				display: flex;
				justify-content: center;
				min-width: max-content;
			}

				display: flex;
				flex-direction: column;
				align-items: center;
				position: relative;
				padding: 0 4px;
			}

			/* The pill node */
			.node-pill {
				display: inline-flex;
				flex-direction: column;
				align-items: center;
				padding: 7px 14px 6px;
				border-radius: 10px;
				font-size: 0.82rem;
				font-weight: 700;
				cursor: pointer;
				user-select: none;
				transition:
					transform 0.15s,
					box-shadow 0.15s,
					filter 0.15s;
				border: 2px solid transparent;
				box-shadow: 0 2px 8px var(--shadow);
				position: relative;
				white-space: nowrap;
				min-width: 90px;
				text-align: center;
			}

				transform: translateY(-2px);
				box-shadow: 0 5px 16px rgba(60, 30, 5, 0.18);
				filter: brightness(1.08);
			}

				content: '';

				bottom: -12px;
				left: 50%;
				transform: translateX(-50%);
				width: 2px;
				height: 12px;
				background: var(--line);

				direction: rtl;
				line-height: 1.3;
				color: inherit;
				opacity: 0.85;

				align-items: center;
				justify-content: center;
				width: 18px;
				height: 18px;
				border-radius: 50%;
				background: rgba(255, 255, 255, 0.3);
				border: 1.5px solid rgba(255, 255, 255, 0.5);
				font-size: 0.7rem;
				font-weight: 900;
				line-height: 1;
				cursor: pointer;
				margin-top: 4px;
				transition: background 0.15s;
				flex-shrink: 0;
			}
			.toggle-btn:hover {
				background: rgba(255, 255, 255, 0.5);
			}

				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				pointer-events: none;
				overflow: visible;
			}

				flex-direction: row;
				justify-content: center;
				align-items: flex-start;
				gap: 0;
				position: relative;
				margin-top: 26px;

			.children-wrap.collapsed {

																								name: 'Takmeel Iqbal (تکمیل)'
																							}
																						]
																				}
																			]
																	}
																]
															},
															{
																name: 'Md Shoaib (محمد شعیب)',
																children: [
																	{
																		name: 'Hasan (حسن)'
																	},
																	{
																		name: 'Hasnain (حسنین)'
																	}
																]
															}
														]
													}
												]
											}
										]
									}
								]
							}
						]
					}
				]
			};

			// ── gen colors ──
			const GEN_COLORS = [
				'g0',
				'g1',
				'g2',
				'g3',
				'g4',
				'g5',
				'g6',
				'g7',
				'g8',
				'g9',
				'g10'
			];
			const GEN_LABELS = [
				{
					label: 'Gen 1–4 (Ancestors)',
					colors: ['#3d2008', '#5c3010', '#7a4218', '#9a5a22']
				},
				{ label: "Gen 5 (Akbar Ali's sons)", color: '#b87030' },
				{ label: 'Gen 6', color: '#2e6b38' },
				{ label: 'Gen 7', color: '#1a5494' },
				{ label: 'Gen 8', color: '#5c1a82' },
				{ label: 'Gen 9', color: '#981822' },
				{ label: 'Gen 10+', color: '#007080' }
			];

			function buildLegend() {
				const el = document.getElementById('legend');
				const items = [
					{ label: 'Gen 1–4 (ancestors)', color: '#7a4218' },
					{ label: 'Gen 5', color: '#b87030' },
					{ label: 'Gen 6', color: '#2e6b38' },
					{ label: 'Gen 7', color: '#1a5494' },
					{ label: 'Gen 8', color: '#5c1a82' },
					{ label: 'Gen 9', color: '#981822' },
					{ label: 'Gen 10+', color: '#007080' }
				];
				items.forEach(function (g) {
					const d = document.createElement('div');
					d.className = 'legend-item';
					d.innerHTML =
						'<span class="legend-dot" style="background:' +
						g.color +
						'"></span><span>' +
						g.label +
						'</span>';
					el.appendChild(d);
				});
			}

			function parseName(full) {
				const m = full.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
				if (m) return { en: m[1].trim(), ur: m[2].trim() };
				if (/^[\u0600-\u06FF\s]+$/.test(full.trim()))
					return { en: '', ur: full.trim() };
				return { en: full.trim(), ur: '' };
			}

			// Build the vertical top-down tree as nested DOM
			function buildVNode(person, depth) {
				depth = depth || 0;
				const hasChildren =
					person.children && person.children.length > 0;
				const genClass =
					GEN_COLORS[Math.min(depth, GEN_COLORS.length - 1)];
				const p = parseName(person.name);

				const group = document.createElement('div');
				group.className = 'node-group';
				group.dataset.depth = depth;

				// pill
				const pill = document.createElement('div');
				pill.className =
					'node-pill ' +
					genClass +
					(hasChildren ? ' has-children' : '');
				pill.dataset.name = person.name.toLowerCase();

				if (p.en) {
					const enSpan = document.createElement('span');
					enSpan.className = 'pill-en';
					enSpan.textContent = p.en;
					pill.appendChild(enSpan);
				}
				if (p.ur) {
					const urSpan = document.createElement('span');
					urSpan.className = 'pill-ur';
					urSpan.textContent = p.ur;
					pill.appendChild(urSpan);
				}

				group.appendChild(pill);

				if (hasChildren) {
					// auto-expand first 5 gens
					const expanded = depth < 4;

					const childWrap = document.createElement('div');
					childWrap.className =
						'children-wrap' + (expanded ? '' : ' collapsed');

					person.children.forEach(function (c) {
						childWrap.appendChild(buildVNode(c, depth + 1));
					});

					group.appendChild(childWrap);

					pill.addEventListener('click', function () {
						const isCollapsed =
							childWrap.classList.contains('collapsed');
						childWrap.classList.toggle('collapsed', !isCollapsed);
						// redraw connectors after toggle (brief delay for layout)
						setTimeout(drawAllConnectors, 50);
					});
				}

				return group;
			}

			// ── SVG connector lines ──
			// We draw bezier curves from parent pill bottom-center to each child pill top-center
			const svgNS = 'http://www.w3.org/2000/svg';

			function getCenter(el) {
				const r = el.getBoundingClientRect();
				return {
					x: r.left + r.width / 2,
					y: r.top + r.height / 2,
					top: r.top,
					bottom: r.bottom,
					left: r.left,
					right: r.right
				};
			}

			function drawAllConnectors() {
				// Remove old SVG overlays
				document
					.querySelectorAll('.tree-svg-overlay')
					.forEach(function (s) {
						s.remove();
					});

				const scrollEl = document.querySelector('.tree-scroll');
				const scrollRect = scrollEl.getBoundingClientRect();
				const scrollLeft = scrollEl.scrollLeft;
				const scrollTop = scrollEl.scrollTop;

				// Create one big SVG overlay
				const svg = document.createElementNS(svgNS, 'svg');
				svg.classList.add('tree-svg-overlay');
				svg.style.cssText =
					'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;';

				document
					.querySelectorAll('.node-group')
					.forEach(function (group) {
						const childWrap = group.querySelector(
							':scope > .children-wrap'
						);
						if (
							!childWrap ||
							childWrap.classList.contains('collapsed')
						)
							return;

						const parentPill = group.querySelector(
							':scope > .node-pill'
						);
						const childPills = Array.from(
							childWrap.querySelectorAll(
								':scope > .node-group > .node-pill'
							)
						);

						if (!parentPill || childPills.length === 0) return;

						const pRect = parentPill.getBoundingClientRect();
						const px =
							pRect.left +
							pRect.width / 2 -
							scrollRect.left +
							scrollLeft;
						const py = pRect.bottom - scrollRect.top + scrollTop;

						// determine line color from parent pill's gen class
						const genMatch =
							parentPill.className.match(/\bg(\d+)\b/);
						const depth = genMatch ? parseInt(genMatch[1]) : 0;
						const lineColors = [
							'#63482a',
							'#7a5a36',
							'#9a6a40',
							'#b87030',
							'#c88040',
							'#2e6b38',
							'#1a5494',
							'#5c1a82',
							'#981822',
							'#007080',
							'#c04800'
						];
						const stroke =
							lineColors[Math.min(depth, lineColors.length - 1)];

						childPills.forEach(function (cPill) {
							const cRect = cPill.getBoundingClientRect();
							const cx =
								cRect.left +
								cRect.width / 2 -
								scrollRect.left +
								scrollLeft;
							const cy = cRect.top - scrollRect.top + scrollTop;

							const midY = py + (cy - py) * 0.5;

							const path = document.createElementNS(
								svgNS,
								'path'
							);
							path.setAttribute(
								'd',
								`M${px},${py} C${px},${midY} ${cx},${midY} ${cx},${cy}`
							);
							path.setAttribute('fill', 'none');
							path.setAttribute('stroke', stroke);
							path.setAttribute('stroke-width', '1.8');
							path.setAttribute('stroke-opacity', '0.6');
							svg.appendChild(path);
						});
					});

				const treeScroll = document.querySelector('.tree-scroll');
				treeScroll.style.position = 'relative';
				treeScroll.appendChild(svg);
			}

			function toggleAll(state) {
				document
					.querySelectorAll('.children-wrap')
					.forEach(function (w) {
						w.classList.toggle('collapsed', !state);
					});
				setTimeout(drawAllConnectors, 50);
			}

			function searchTree() {
				const q = document
					.getElementById('search')
					.value.trim()
					.toLowerCase();
				let count = 0;
				document
					.querySelectorAll('.node-pill')
					.forEach(function (pill) {
						pill.classList.remove('highlight');
						if (!q) return;
						const text = pill.dataset.name || '';
						if (text.indexOf(q) !== -1) {
							pill.classList.add('highlight');
							count++;
							// expand ancestors
							let p = pill.parentElement;
							while (p) {
								if (
									p.classList &&
									p.classList.contains('children-wrap')
								) {
									p.classList.remove('collapsed');
								}
								p = p.parentElement;
							}
						}
					});
				const rc = document.getElementById('result-count');
				rc.textContent = q
					? count === 0
						? 'No matches.'
						: count + ' match' + (count > 1 ? 'es' : '') + ' found'
					: '';
				setTimeout(drawAllConnectors, 50);
			}

			// Init
			buildLegend();
			const root = document.getElementById('vtree-root');
			root.appendChild(buildVNode(familyData, 0));

			// Draw connectors after layout
			window.addEventListener('load', function () {
				setTimeout(drawAllConnectors, 100);
			});
			window.addEventListener('resize', function () {
				setTimeout(drawAllConnectors, 100);
			});
			document
				.querySelector('.tree-scroll')
				.addEventListener('scroll', function () {
					drawAllConnectors();
				});
		</script>
	</body>
</html>
