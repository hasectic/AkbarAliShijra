				outline: none;
			}

			}

				align-items: center;

			const GEN_LABELS = [
				{ label: 'Gen 1–4 (Quasim Ali → Akbar Ali)', color: '#63482a' },
				{ label: 'Gen 5', color: '#2e7d32' },
				{ label: 'Gen 6', color: '#1565c0' },
				{ label: 'Gen 7', color: '#6a1f96' },

				{ label: 'Gen 9', color: '#00838f' },
				{ label: 'Gen 10+', color: '#e65100' }
			];

			function buildLegend() {
				const el = document.getElementById('legend');
				GEN_LABELS.forEach(function (g) {
					var d = document.createElement('div');
					d.className = 'legend-item';
					d.innerHTML =
						'<span class="legend-dot" style="background:' +
						g.color +
						'"></span><span>' +
						g.label +
						'</span>';
					el.appendChild(d);
				});
			}

			function parseName(full) {
				var m = full.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
				if (m) return { en: m[1].trim(), ur: m[2].trim() };
				if (/^[\u0600-\u06FF\s]+$/.test(full.trim()))
					return { en: '', ur: full.trim() };
				return { en: full.trim(), ur: '' };
			}

			function nameHTML(full) {
				var p = parseName(full),
					en = p.en,
					ur = p.ur;
				if (en && ur)
					return (
						'<span class="name-en">' +
						en +
						'</span><span class="name-sep"> | </span><span class="name-ur">' +
						ur +
						'</span>'
					);
				if (ur) return '<span class="name-ur">' + ur + '</span>';
				return '<span class="name-en">' + en + '</span>';
			}

			function buildNode(person, depth, isRoot) {
				depth = depth || 0;
				isRoot = isRoot || false;
				var hasChildren = person.children && person.children.length > 0;
				var g = Math.min(depth, 9);
				if (isRoot) {
					var li = document.createElement('li');
					li.className = 'root-node';
					li.innerHTML =
						'<div class="node-wrapper"><span class="node" data-gen="' +
						g +
						'">' +
						nameHTML(person.name) +
						'</span></div>';
					var ul = document.createElement('ul');
					person.children.forEach(function (c) {
						ul.appendChild(buildNode(c, depth + 1));
					});
					li.appendChild(ul);
					return li;
				}
				if (hasChildren) {
					var li = document.createElement('li');
					var details = document.createElement('details');
					if (depth < 5)
						details.open = true; /* auto-expand gen 1–5 */
					var summary = document.createElement('summary');
					summary.innerHTML =
						'<div class="node-wrapper"><span class="node" data-gen="' +
						g +
						'"><span class="icon"></span>' +
						nameHTML(person.name) +
						'</span></div>';
					details.appendChild(summary);
					var ul = document.createElement('ul');
					person.children.forEach(function (c) {
						ul.appendChild(buildNode(c, depth + 1));
					});
					details.appendChild(ul);
					li.appendChild(details);
					return li;
				}
				var li = document.createElement('li');
				li.innerHTML =
					'<div class="node-wrapper"><span class="node" data-gen="' +
					g +
					'">' +
					nameHTML(person.name) +
					'</span></div>';
				return li;
			}

			function renderTree() {
				var root = document.getElementById('tree-root');
				var ul = document.createElement('ul');
				ul.appendChild(buildNode(familyData, 0, true));
				root.appendChild(ul);
			}

			function toggleAll(state) {
				document
					.querySelectorAll('.tree-container details')
					.forEach(function (d) {
						d.open = state;
					});
			}

			function searchTree() {
				var q = document
					.getElementById('search')
					.value.trim()
					.toLowerCase();
				var count = 0;
				document.querySelectorAll('.node').forEach(function (n) {
					n.classList.remove('highlight');
					if (!q) return;
					var text = n.textContent
						.replace(/[+\u2212|]/g, '')
						.trim()
						.toLowerCase();
					if (text.indexOf(q) !== -1) {
						n.classList.add('highlight');
						count++;
						var p = n.parentElement;
						while (p) {
							if (p.tagName === 'DETAILS') p.open = true;
							p = p.parentElement;
						}
					}
				});
				var rc = document.getElementById('result-count');
				rc.textContent = q
					? count === 0
						? 'No matches found.'
						: count + ' match' + (count > 1 ? 'es' : '') + ' found'
					: '';
			}

			buildLegend();
			renderTree();
		</script>
	</body>
</html>
